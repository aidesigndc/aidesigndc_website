<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I am owed bread Design</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap');

body {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  font-family:'Times New Roman', Times, serif;
  margin:40px;
  margin-left:40vh;
}

.project {
  display:flex;
  flex-direction:column;
  gap:40px;
  width:100%;
}

.logo {
  font-size:20px;
  margin-bottom:40px;
  color: maroon;
}

.project-item {
  position:relative;

.main-image {
  width:200px;
  height:200px;
  object-fit:cover;
  cursor:pointer;
  display:block;
}

.extra-images {
  position:absolute;
  top:0;
  left:220px;
  display:flex;
  gap:10px;
}

.extra-images img {
  height:200px;
  object-fit:cover;
  display:block;
  opacity:0;
  transform:translateX(-20px);
  transition:opacity 0.4s ease, transform 0.4s ease;
}

.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }

.project-item:hover .extra-images img {
  opacity:1;
  transform:translateX(0);
}

/* hidden admin panel */
#uploadControls {
  display:none;
  margin-bottom:40px;
  border:1px solid #ccc;
  padding:20px;
}
</style>
</head>
<body>

<div class="logo">
  <h1>A&I am owed bread Design</h1>
</div>

<div id="uploadControls">
  <input type="file" id="imageUpload" multiple accept="image/*">
  <br><br>
  <label>Main Image Index (1-5):</label>
  <input type="number" id="mainIndex" min="1" max="5" value="1">
  <button onclick="uploadImagesSupabase()">Apply Images</button>
</div>

<div class="project">

    <img src="../images/chair.webp" class="main-image">
    <div class="extra-images">
      <img src="../images/chair2.webp">

      <img src="../images/chair7.jpg">
    </div>
  </div>
  <div class="project-item">
    <img src="../images/chair2.webp" class="main-image">
    <div class="extra-images">
      <img src="../images/chair.webp">
      <img src="../images/image3.jpg">
      <img src="../images/whiteM.png">
      <img src="../images/chair2.webp">
    </div>
  </div>
  <div class="project-item">
    <img src="../images/image3.jpg" class="main-image">
    <div class="extra-images">

      <img src="../images/chair2.webp">
      <img src="../images/whiteM.png">
      <img src="../images/chair2.webp">

  </div>
  <div class="project-item">
    <img src="../images/whiteM.png" class="main-image">

  </div>
</div>

<!-- Firebase-like: Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========== SUPABASE CONFIG ==========
const supabaseUrl = "https://akxfknwujratwjolwwar.supabase.co";
const supabaseAnonKey = "sb_publishable_v6_XC8fxKYba0GJo8otcKQ_dN9mSpnS";
const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

// ========== SECRET ADMIN SHORTCUT ==========
document.addEventListener("keydown", function(e){
  if(e.shiftKey && e.key.toLowerCase() === "u"){
    let password = prompt("Enter admin password");
    if(password === "ihateschool"){
      document.getElementById("uploadControls").style.display = "block";
    } else {
      alert("Incorrect password");
    }
  }
});

// ========== IMAGE UPLOAD SYSTEM ==========
async function uploadImagesSupabase() {
  const files = document.getElementById("imageUpload").files;
  const mainIndex = document.getElementById("mainIndex").value - 1;
  if (!files.length) return;

  let urls = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const filename = `${Date.now()}-${file.name}`;

    // Upload to Supabase Storage
    const { data, error } = await supabase
      .storage
      .from('images')
      .upload(filename, file, { cacheControl: '3600', upsert: false });

    if (error) {
      console.error("Upload error:", error);
      continue;
    }

    // Get public URL
    const { data: urlData } = supabase
      .storage
      .from('images')
      .getPublicUrl(filename);

    urls.push(urlData.publicUrl);
  }

  // Update HTML with new images
  const mainImage = document.querySelector(".project-item .main-image");
  const extraContainer = document.querySelector(".project-item .extra-images");
  extraContainer.innerHTML = "";

  urls.forEach((url, i) => {
    if (i === mainIndex) {
      mainImage.src = url;
    } else {
      const img = document.createElement("img");
      img.src = url;
      extraContainer.appendChild(img);
    }
  });

  alert("Upload successful!");
}
</script>

</body>
</html>

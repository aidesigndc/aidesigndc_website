<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I am owed bread Design</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap" rel="stylesheet">

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    font-family:'Times New Roman', Times, serif;
    margin:40px;
    margin-left:40vh;
}

.project {
    display:flex;
    flex-direction:column;
    gap:40px;
    width:100%;
}

.logo {
    font-size:20px;
    margin-bottom:40px;
    color: maroon;
}

.project-item {
    position:relative;
}

.main-image {
    width:200px;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    display:block;
}

.extra-images {
    position:absolute;
    top:0;
    left:220px;
    display:flex;
    gap:10px;
}

.extra-images img {
    height:200px;
    object-fit:cover;
    display:block;
    opacity:0;
    transform:translateX(-20px);
    transition:opacity 0.4s ease, transform 0.4s ease;
}

.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }

.project-item:hover .extra-images img {
    opacity:1;
    transform:translateX(0);
}
</style>
</head>
<body>

<div class="logo">
    <h1>A&I am owed bread Design</h1>
</div>

<!-- PASSWORD GATE -->
<div id="passwordGate">
    <label>Enter password:</label>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">Enter</button>
</div>

<!-- UPLOAD CONTROLS (hidden until password correct) -->
<div id="uploadControls" style="display:none;">
    <input type="file" id="imageUpload" multiple accept="image/*">
    <br><br>
    <label>Main Image Index (1-5):</label>
    <input type="number" id="mainIndex" min="1" max="5" value="0">
    <button id="applyBtn">Apply Images</button>
</div>

<!-- PROJECT DISPLAY -->
<div class="project">
    <div class="project-item">
        <img src="https://via.placeholder.com/200" class="main-image" alt="Main">
        <div class="extra-images"></div>
    </div>
</div>

<!-- Supabase ESM Module -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ===== REPLACE THESE with your Supabase project URL and anon/public key =====
const supabaseUrl = "https://akxfknwujratwjolwwar.supabase.co";
const supabaseKey = "sb_publishable_v6_XC8fxKYba0GJo8otcKQ_dN9mSpnS";
const supabase = createClient(supabaseUrl, supabaseKey);

// --- Password gate ---
window.checkPassword = function() {
    const correctPassword = "Ihateschool";
    const entered = document.getElementById("passwordInput").value;
    if (entered === correctPassword) {
        document.getElementById("uploadControls").style.display = "block";
        document.getElementById("passwordGate").style.display = "none";
    } else {
        alert("Incorrect password");
    }
}

// --- Upload images ---
async function applyImages() {
    const files = document.getElementById("imageUpload").files;
    const mainIndex = parseInt(document.getElementById("mainIndex").value);
    if(files.length === 0) return;

    const mainImage = document.querySelector(".project-item .main-image");
    const extraContainer = document.querySelector(".project-item .extra-images");
    extraContainer.innerHTML = "";

    let urls = [];

    for(let i=0; i<files.length; i++){
        const file = files[i];
        const safeName = file.name.replace(/\s/g, "_");
        const fileName = `${Date.now()}_${safeName}`;

        // Upload to Supabase bucket 'images'
        const { data, error } = await supabase.storage
            .from('images')
            .upload(fileName, file, { cacheControl: '3600', upsert: false });

        if(error){
            console.error("Upload error:", error.message);
            continue;
        }

        // Get public URL
        const { data: publicData } = supabase.storage
            .from('images')
            .getPublicUrl(fileName);

        urls.push(publicData.publicUrl);
    }

    // Populate main + extra images
    urls.forEach((url,i)=>{
        if(i === mainIndex){
            mainImage.src = url;
        } else {
            const img = document.createElement("img");
            img.src = url;
            extraContainer.appendChild(img);
        }
    });
}

document.getElementById("applyBtn").addEventListener("click", applyImages);
</script>

</body>
</html>

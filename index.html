<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I Design</title>
<style>
body{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:'Times New Roman', Times, serif;
    margin:40px auto;
    max-width:900px;
}
.project{
    display:flex;
    flex-direction:column;
    gap:20px;
    width:100%;
}
.logo{
    font-size:20px;
    margin-bottom:40px;
    color:maroon;
    text-align:center;
    width:100%;
}
.project-item{
    position:relative;
    display:flex;
    flex-direction:row;
    gap:4px;
    margin-bottom:20px;
}
.main-image{
    width:200px;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}
.extra-images{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}
.extra-images img{
    height:200px;
    width:auto;
    object-fit:cover;
    opacity:0;
    transform:translateX(0px);
    transition:opacity 0.4s ease, transform 0.4s ease;
}
.project-item.show-extras .extra-images img{
    opacity:1;
}
#floatingLogo{
    position:fixed;
    bottom:20px;
    left:20px;
    width:100px;
    height:auto;
    z-index:1000;
    opacity:0.1;
}

/* MOBILE */
@media (max-width:700px){
    body{
        margin:15px;
        align-items:flex-start;
    }
    .project-item{
        flex-direction:column;
    }
    .main-image{
        width:100%;
        height:0;
        padding-top:100%;
        position:relative;
    }
    .main-image-container{
        width:100%;
        position:relative;
        padding-top:100%;
    }
    .main-image-container img{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        object-fit:cover;
    }
    .extra-images img{
        height:150px;
        width:auto;
    }
    #floatingLogo{
        width:60px;
        left:10px;
        bottom:10px;
    }
}
</style>
</head>
<body>
<div class="logo"><h1>A&I am owed bread Design</h1></div>

<div id="uploadControls" style="display:none;">
<input type="file" id="imageUpload" multiple accept="image/*">
<br><br>
<label>Main Image (1 = first):</label>
<input type="number" id="mainIndex" min="1" max="5" value="1">
<button id="applyBtn">Upload & Display</button>
</div>

<div class="project" id="projectContainer"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl="https://akxfknwujratwjolwwar.supabase.co";
const supabaseKey="sb_publishable_v6_XC8fxKYba0GJo8otcKQ_dN9mSpnS";
const supabase=createClient(supabaseUrl,supabaseKey);

// Toggle upload controls
document.addEventListener("keydown",(e)=>{
    if(e.shiftKey && e.key.toLowerCase()==="u"){
        const controls=document.getElementById("uploadControls");
        controls.style.display = controls.style.display==="none" ? "block" : "none";
    }
});

function createProjectItem(urls,mainIndex=0){
    const projectContainer=document.getElementById("projectContainer");
    const newItem=document.createElement("div");
    newItem.classList.add("project-item");

    const isMobile = window.innerWidth <= 700;

    // Main image
    let mainImg;
    if(isMobile){
        const mainContainer=document.createElement("div");
        mainContainer.classList.add("main-image-container");
        mainImg=document.createElement("img");
        mainImg.src = urls[mainIndex]||urls[0];

        mainImg.addEventListener("click",()=>{
            const active = newItem.classList.contains("show-extras");
            // hide all others
            document.querySelectorAll('.project-item.show-extras').forEach(item=>{
                if(item!==newItem)item.classList.remove("show-extras");
            });
            newItem.classList.toggle("show-extras");
            // apply staggered delays
            updateExtraDelays(newItem);
        });

        mainContainer.appendChild(mainImg);
        newItem.appendChild(mainContainer);
    } else {
        mainImg=document.createElement("img");
        mainImg.classList.add("main-image");
        mainImg.src = urls[mainIndex]||urls[0];
        newItem.appendChild(mainImg);

        // desktop hover: add show-extras on hover
        newItem.addEventListener("mouseenter",()=>{ 
            newItem.classList.add("show-extras"); 
            updateExtraDelays(newItem);
        });
        newItem.addEventListener("mouseleave",()=>{ 
            newItem.classList.remove("show-extras"); 
            updateExtraDelays(newItem,true); 
        });
    }

    // Extra images
    const extraDiv = document.createElement("div");
    extraDiv.classList.add("extra-images");
    urls.forEach((url,i)=>{
        if(i!==mainIndex){
            const img=document.createElement("img");
            img.src=url;
            extraDiv.appendChild(img);
        }
    });
    newItem.appendChild(extraDiv);
    projectContainer.appendChild(newItem);
}

function updateExtraDelays(item,reverse=false){
    const imgs = Array.from(item.querySelectorAll('.extra-images img'));
    imgs.forEach((img,i)=>{
        const total = imgs.length;
        let idx = reverse ? total-1-i : i;
        img.style.transitionDelay = `${idx*0.1}s`;
        img.style.transform = item.classList.contains('show-extras') ? 'translateX(0)' : 'translateX(-20px)';
    });
}

async function applyImages(){
    const files=document.getElementById("imageUpload").files;
    let mainIndex=parseInt(document.getElementById("mainIndex").value)-1;
    mainIndex=Math.max(0,Math.min(mainIndex,files.length-1));
    if(files.length===0) return;

    let uploadedUrls=[];
    for(let i=0;i<files.length;i++){
        const file=files[i];
        const safeName=file.name.replace(/\s/g,"_");
        const fileName=`${Date.now()}_${safeName}`;
        const { error } = await supabase.storage.from('images').upload(fileName,file);
        if(error){ console.error(error); continue; }
        const { data } = supabase.storage.from('images').getPublicUrl(fileName);
        uploadedUrls.push(data.publicUrl);
    }

    await supabase.from("projects").insert([{images:uploadedUrls, main_index:mainIndex}]);
    createProjectItem(uploadedUrls, mainIndex);
}

document.getElementById("applyBtn").addEventListener("click",(e)=>{
    e.preventDefault();
    applyImages();
});

window.addEventListener("DOMContentLoaded", async ()=>{
    const { data,error } = await supabase.from("projects").select("*").order("created_at",{ascending:true});
    if(error){ console.error(error); return; }
    data.forEach(project=>{ createProjectItem(project.images, project.main_index); });
});
</script>

<img src="images/logo.png" id="floatingLogo">
</body>
</html>

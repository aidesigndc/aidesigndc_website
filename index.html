<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I am owed bread Design</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap');

body{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    font-family:'Times New Roman', Times, serif;
    margin:40px;
    margin-left:40vh;
}

.project{
    display:flex;
    flex-direction:column;
    gap:40px;
    width:100%;
}

.logo{
    font-size:20px;
    margin-bottom:40px;
    color: maroon;
}

.project-item{
    position:relative;
}

.main-image{
    width:200px;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    display:block;
}

.extra-images{
    position:absolute;
    top:0;
    left:220px;
    display:flex;
    gap:10px;
}

.extra-images img{
    height:200px;
    object-fit:cover;
    display:block;
    opacity:0;
    transform:translateX(-20px);
    transition:opacity 0.4s ease, transform 0.4s ease;
}

.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }

.project-item:hover .extra-images img{
    opacity:1;
    transform:translateX(0);
}

/* hidden admin panel */
#uploadControls{
    display:none;
    margin-bottom:40px;
    border:1px solid #ccc;
    padding:20px;
}
</style>
</head>

<body>

<div class="logo">
<h1>A&I am owed bread Design</h1>
</div>

<!-- Admin Upload Panel -->
<div id="uploadControls">
    <input type="file" id="imageUpload" multiple accept="image/*">
    <br><br>
    <label>Main Image Index (1-5):</label>
    <input type="number" id="mainIndex" min="1" max="5" value="1">
    <button onclick="applyImages()">Apply Images</button>
</div>

<!-- Gallery -->
<div class="project" id="gallery">
    <!-- Project items will be appended here after upload -->
</div>

<script>
// Admin Shortcut: Shift+U
document.addEventListener("keydown", function(e){
    if(e.shiftKey && e.key.toLowerCase() === "u"){
        let password = prompt("Enter admin password");
        if(password === "ihateschool"){
            document.getElementById("uploadControls").style.display = "block";
        } else {
            alert("Incorrect password");
        }
    }
});

// Upload images to Cloudflare Worker → GitHub
async function applyImages(){
    const files = document.getElementById("imageUpload").files;
    if(files.length === 0){
        alert("No files selected");
        return;
    }

    const workerURL = "https://test.eliasgiorhee.workers.dev/"; // <-- Replace with your Worker URL
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = ""; // clear previous gallery

    const mainIndex = parseInt(document.getElementById("mainIndex").value) - 1;

    for(let i=0; i<files.length; i++){
        const file = files[i];
        const reader = new FileReader();
        reader.onload = async function(){
            const base64 = reader.result.split(",")[1];

            // Send to Worker
            const res = await fetch(workerURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    filename: file.name,
                    contentBase64: base64
                })
            });
            const data = await res.json();
            console.log(data);

            // Add to gallery
            const itemDiv = document.createElement("div");
            itemDiv.classList.add("project-item");

            const imgMain = document.createElement("img");
            imgMain.src = `https://raw.githubusercontent.com/aidesigndc/aidesigndc_website/main/images/${file.name}`;
            imgMain.classList.add("main-image");
            if(i === mainIndex) imgMain.style.border = "3px solid maroon";

            const extraDiv = document.createElement("div");
            extraDiv.classList.add("extra-images");
            extraDiv.appendChild(imgMain.cloneNode()); // extra image for hover

            itemDiv.appendChild(imgMain);
            itemDiv.appendChild(extraDiv);
            gallery.appendChild(itemDiv);
        }
        reader.readAsDataURL(file);
    }

    alert("Uploading to GitHub... check your repo in a few seconds");
}
</script>

</body>
</html>

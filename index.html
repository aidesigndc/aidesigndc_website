<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I am owed bread Design</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap" rel="stylesheet">

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    font-family:'Times New Roman', Times, serif;
    margin:40px;
    margin-left:40vh;
}

.project {
    display:flex;
    flex-direction:column;
    gap:40px;
    width:100%;
}

.logo {
    font-size:20px;
    margin-bottom:40px;
    color:maroon;
}

.project-item {
    position:relative;
    display:flex;
    flex-direction:row;
    gap:10px;
    margin-bottom:20px;
}

.main-image {
    width:200px;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}

.extra-images {
    display:flex;
    gap:10px;
}

.extra-images img {
    height:200px;
    object-fit:cover;
    opacity:0;
    transform:translateX(-20px);
    transition:opacity 0.4s ease, transform 0.4s ease;
}

.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }

.project-item:hover .extra-images img {
    opacity:1;
    transform:translateX(0);
}
</style>
</head>

<body>

<div class="logo"><h1>A&I am owed bread Design</h1></div>

<div id="uploadControls" style="display:none;">
<input type="file" id="imageUpload" multiple accept="image/*">
<br><br>
<label>Main Image Index (0-based):</label>
<input type="number" id="mainIndex" min="0" value="0">
<button id="applyBtn">Upload & Display</button>
</div>

<div class="project" id="projectContainer"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://akxfknwujratwjolwwar.supabase.co";
const supabaseKey = "sb_publishable_v6_XC8fxKYba0GJo8otcKQ_dN9mSpnS";
const supabase = createClient(supabaseUrl, supabaseKey);


/* SHIFT + U toggle */

document.addEventListener("keydown", (e) => {

    if(e.shiftKey && e.key.toLowerCase() === "u"){

        const controls = document.getElementById("uploadControls");

        if(controls.style.display === "none"){
            controls.style.display = "block";
        } else {
            controls.style.display = "none";
        }

    }

});


function createProjectItem(urls, mainIndex = 0){

    const projectContainer = document.getElementById("projectContainer");

    const newItem = document.createElement("div");
    newItem.classList.add("project-item");

    const mainUrl = urls[mainIndex] || urls[0];

    const mainImg = document.createElement("img");
    mainImg.classList.add("main-image");
    mainImg.src = mainUrl;

    newItem.appendChild(mainImg);

    const extraDiv = document.createElement("div");
    extraDiv.classList.add("extra-images");

    urls.forEach((url, i) => {

        if(i !== mainIndex){

            const img = document.createElement("img");
            img.src = url;

            extraDiv.appendChild(img);

        }

    });

    newItem.appendChild(extraDiv);

    projectContainer.appendChild(newItem);

}


async function applyImages(){

    const files = document.getElementById("imageUpload").files;
    const mainIndex = parseInt(document.getElementById("mainIndex").value);

    if(files.length === 0) return;

    let uploadedUrls = [];

    for(let i=0;i<files.length;i++){

        const file = files[i];
        const safeName = file.name.replace(/\s/g,"_");
        const fileName = `${Date.now()}_${safeName}`;

        const { error } = await supabase
            .storage
            .from('images')
            .upload(fileName, file);

        if(error){
            console.error(error);
            continue;
        }

        const { data } = supabase
            .storage
            .from('images')
            .getPublicUrl(fileName);

        uploadedUrls.push(data.publicUrl);

    }


    await supabase
        .from("projects")
        .insert([
            {
                images: uploadedUrls,
                main_index: mainIndex
            }
        ]);

    createProjectItem(uploadedUrls, mainIndex);

}


document.getElementById("applyBtn").addEventListener("click", e => {

    e.preventDefault();
    applyImages();

});


window.addEventListener("DOMContentLoaded", async () => {

    const { data, error } = await supabase
        .from("projects")
        .select("*")
        .order("created_at", { ascending: true });

    if(error){
        console.error(error);
        return;
    }

    data.forEach(project => {
        createProjectItem(project.images, project.main_index);
    });

});

</script>

</body>
</html>

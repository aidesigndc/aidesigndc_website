<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap');

body{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    font-family:'Times New Roman', Times, serif;
    margin:40px;
    margin-left:40vh;
}

.project{
    display:flex;
    flex-direction:column;
    gap:40px;
    width:100%;
}

.logo{
    font-size:20px;
    margin-bottom:40px;
    color: maroon;
}

.project-item{
    position:relative;
}

.main-image{
    width:200px;
    height:auto;
    cursor:pointer;
}

.extra-images{
    position:absolute;
    top:0;
    left:220px;
    display:flex;
    gap:10px;
}

.main-image{
    width:200px;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    display:block;
}

.extra-images img{
    height:200px;
    object-fit:cover;
    display:block;
    opacity:0;
    transform:translateX(-20px);
    transition:opacity 0.4s ease, transform 0.4s ease;
}

.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }

.project-item:hover .extra-images img{
    opacity:1;
    transform:translateX(0);
}

/* hidden admin panel */

#uploadControls{
display:none;
margin-bottom:40px;
border:1px solid #ccc;
padding:20px;
}

</style>
</head>

<body>

<div class="logo">
<h1>A&I am owed bread Design</h1>
</div>

<div id="uploadControls">

<input type="file" id="imageUpload" multiple accept="image/*">

<br><br>

<label>Main Image Index (1-5):</label>
<input type="number" id="mainIndex" min="1" max="5" value="1">

<button onclick="applyImages()">Apply Images</button>

</div>

</div>

<script>

/* SECRET ADMIN SHORTCUT */

document.addEventListener("keydown", function(e){

if(e.shiftKey && e.key.toLowerCase() === "u"){

let password = prompt("Enter admin password")

if(password === "ihateschool"){

document.getElementById("uploadControls").style.display = "block"

}else{

alert("Incorrect password")

}

}

})

/* IMAGE UPLOAD SYSTEM */

async function applyImages(){

const files = document.getElementById("imageUpload").files

if(files.length === 0){
alert("No files selected")
return
}

const token = "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"
const owner = "aidesigndc"
const repo = "aidesigndc_website"
const branch = "main"

for(let file of files){

const reader = new FileReader()

reader.onload = async function(){

const base64 = reader.result.split(",")[1]

const path = "images/" + file.name

const response = await fetch(
`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
{
method: "PUT",
headers: {
"Authorization": "token " + token,
"Content-Type": "application/json"
},
body: JSON.stringify({
message: "upload image",
content: base64,
branch: branch
})
}
)

const data = await response.json()

console.log(data)

}

reader.readAsDataURL(file)

}

alert("Uploading to GitHub... check your repo in a few seconds")

}

</script>

</body>
</html>

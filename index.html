<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&I am owed bread Design</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap" rel="stylesheet">
<style>
body {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    font-family:'Times New Roman', Times, serif;
    margin:40px;
    margin-left:40vh;
}
.project { display:flex; flex-direction:column; gap:40px; width:100%; }
.logo { font-size:20px; margin-bottom:40px; color: maroon; }
.project-item { position:relative; display:flex; flex-direction:row; gap:10px; margin-bottom:20px; }
.main-image { width:200px; height:200px; object-fit:cover; cursor:pointer; display:block; }
.extra-images { display:flex; gap:10px; }
.extra-images img { height:200px; object-fit:cover; display:block; opacity:0; transform:translateX(-20px); transition:opacity 0.4s ease, transform 0.4s ease; }
.extra-images img:nth-child(1){ transition-delay:0.05s; }
.extra-images img:nth-child(2){ transition-delay:0.15s; }
.extra-images img:nth-child(3){ transition-delay:0.25s; }
.extra-images img:nth-child(4){ transition-delay:0.35s; }
.extra-images img:nth-child(5){ transition-delay:0.45s; }
.project-item:hover .extra-images img { opacity:1; transform:translateX(0); }
</style>
</head>
<body>

<div class="logo"><h1>A&I am owed bread Design</h1></div>

<div id="passwordGate">
    <label>Enter password:</label>
    <input type="password" id="passwordInput">
    <button type="button" id="passwordBtn">Enter</button>
</div>

<div id="uploadControls" style="display:none;">
    <input type="file" id="imageUpload" multiple accept="image/*">
    <br><br>
    <label>Main Image Index (0-based):</label>
    <input type="number" id="mainIndex" min="0" value="0">
    <button type="button" id="applyBtn">Upload & Display</button>
</div>

<div class="project" id="projectContainer"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://akxfknwujratwjolwwar.supabase.co";
const supabaseKey = "sb_publishable_v6_XC8fxKYba0GJo8otcKQ_dN9mSpnS";
const supabase = createClient(supabaseUrl, supabaseKey);

document.getElementById("passwordBtn").addEventListener("click", () => {
    const correctPassword = "Ihateschool";
    const entered = document.getElementById("passwordInput").value;
    if(entered === correctPassword){
        document.getElementById("uploadControls").style.display = "block";
        document.getElementById("passwordGate").style.display = "none";
    } else {
        alert("Incorrect password");
    }
});

let allUrls = [];

function createProjectItem(urls, mainIndex=0){
    const validUrls = urls.filter(url=>url && url.trim()!=="");
    if(validUrls.length===0) return; // DO NOT create anything if no valid images

    const projectContainer = document.getElementById("projectContainer");
    const newItem = document.createElement("div");
    newItem.classList.add("project-item");

    // ONLY create main image if it exists
    const mainUrl = validUrls[mainIndex] || validUrls[0];
    if(mainUrl){
        const mainImg = document.createElement("img");
        mainImg.classList.add("main-image");
        mainImg.src = mainUrl;
        newItem.appendChild(mainImg);
    }

    const extraDiv = document.createElement("div");
    extraDiv.classList.add("extra-images");

    validUrls.forEach((url,i)=>{
        if(i!==mainIndex){
            const img = document.createElement("img");
            img.src = url;
            extraDiv.appendChild(img);
        }
    });

    newItem.appendChild(extraDiv);
    projectContainer.appendChild(newItem);
}

async function applyImages(){
    const files = document.getElementById("imageUpload").files;
    const mainIndex = parseInt(document.getElementById("mainIndex").value);
    if(files.length===0) return;

    let uploadedUrls = [];
    for(let i=0;i<files.length;i++){
        const file=files[i];
        const safeName=file.name.replace(/\s/g,"_");
        const fileName=`${Date.now()}_${safeName}`;

        const { data, error } = await supabase.storage.from('images').upload(fileName, file, { cacheControl: '3600', upsert: false });
        if(error){ console.error("Upload error:", error.message); continue; }

        const { data: publicData } = supabase.storage.from('images').getPublicUrl(fileName);
        uploadedUrls.push(publicData.publicUrl);
        allUrls.push(publicData.publicUrl);
    }

    createProjectItem(uploadedUrls, mainIndex);
    localStorage.setItem('allUrls', JSON.stringify(allUrls));
}

document.getElementById("applyBtn").addEventListener("click", e=>{
    e.preventDefault();
    applyImages();
});

window.addEventListener("DOMContentLoaded", async () => {
    const { data, error } = await supabase.storage.from('images').list();
    if(error){ console.error("Error listing images:", error.message); return; }

    const urls = data.map(file=>supabase.storage.from('images').getPublicUrl(file.name).data.publicUrl)
                     .filter(url=>url && url.trim()!=="");

    allUrls = urls;

    if(urls.length>0) createProjectItem(urls, 0);
});
</script>

</body>
</html>
